name: Publish to npm

# Releases retypeset-odyssey to npm using npm Trusted Publishing (OIDC).
# No NPM_TOKEN secret required — the workflow proves its identity to the
# npm registry via a short-lived token GitHub Actions issues for this run.
#
# Trust must be configured once on the npm side:
#   https://www.npmjs.com/package/retypeset-odyssey/access
#   → Trusted Publishers → Add → GitHub Actions
#   → Owner: lifeodyssey, Repo: retypeset-odyssey, Workflow: publish.yml
#
# Two ways to trigger:
#   1. Tag-based:  git tag v0.2.0 && git push --tags
#   2. Manual:     Actions tab → "Publish to npm" → Run workflow
#                  Pick `patch | minor | major` to bump package.json,
#                  the workflow commits + tags + publishes.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Semver bump (only when manually triggered; ignored on tag push)'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Skip the actual publish step'
        type: boolean
        default: false

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit the version bump and push the tag
      id-token: write   # required for OIDC / Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing (OIDC) requires npm CLI >= 11.5.1.
      # Node 22 ships with npm 10.x, which fails with a misleading
      # `E404 PUT https://registry.npmjs.org/<package>` when trying to
      # publish via OIDC. Upgrade explicitly before any npm call.
      - name: Upgrade npm to support Trusted Publishing
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build (sanity check)
        run: pnpm build

      - name: Bump version (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          NEW_VERSION=$(npm version ${{ inputs.version_bump }} --no-git-tag-version)
          echo "Bumped to $NEW_VERSION"
          git add package.json
          git commit -m "chore: release $NEW_VERSION"
          git tag "$NEW_VERSION"
          git push origin HEAD:master
          git push origin "$NEW_VERSION"

      - name: Verify package contents (dry-run)
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public

      - name: Publish summary
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## Published retypeset-odyssey@$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- npm: https://www.npmjs.com/package/retypeset-odyssey/v/$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- provenance: https://www.npmjs.com/package/retypeset-odyssey?activeTab=code" >> $GITHUB_STEP_SUMMARY
